  <script id="13" type="module" pinned="">
    let count = 0;
    let intervalId;

    const displayElement = display(htl.html`<div class="demo">${count}</div>`);

    function updateCounter() {
        displayElement.textContent = count;
        count = ++count % 10;
    }
    // Start the counter after initial display
    intervalId = setInterval(updateCounter, 1000);
    // Stop the counter when the cell is invalidated (e.g., when re-run)
    invalidation.then(() => clearInterval(intervalId));
  </script>
  <script id="15" type="application/vnd.observable.javascript" pinned="">
    o = {
      let o = 0;
      while (true) {
        if (o >= 1) { o = 0; }
        yield o;
        o += 0.02;
      }
    }
  </script>

  <script id="14" type="application/vnd.observable.javascript" pinned="">
