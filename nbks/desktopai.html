  <script id="24" type="text/markdown">

    ## Adding an Anthropic &rightarrow; Claude API Key to Activate LLM Assistance
    Within Observable Desktop – under `Help` – you will be able to access what is now the [Claude Platform](https://platform.claude.com/login) and set up a free/pay-as-you-go Claude account, add some credit to it and obtain an API key that you will then use to activate the AI assistant within the Desktop.

    The minimum amount you can put in is $5 + tax = $5.35. I did this in August and I still have $1.82 credit the following Febrauary. Although my usage has not been great, I haven’t ever hesitated to use the AI assitant and have done quite a lot with it.
  </script>
